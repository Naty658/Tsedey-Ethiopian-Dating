workflows:
  ios-workflow:
    name: iOS Workflow
    integrations:
     app_store_connect: Tsedey Apple Key

    instance_type: mac_mini_m2
    max_build_duration: 120

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.tsedey

    scripts:
      - name: Install dependencies
        script: |
          npm ci

      - name: Generate iOS native project
        script: |
          npx expo prebuild --clean --platform ios --non-interactive

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Use provisioning profiles
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          WORKSPACE=$(find ios -maxdepth 1 -name "*.xcworkspace" | head -1)
          SCHEME=$(find ios -maxdepth 1 -name "*.xcodeproj" | head -1 | xargs basename | sed 's/\.xcodeproj$//')
          xcode-project build-ipa \
            --workspace "$WORKSPACE" \
            --scheme "$SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration

